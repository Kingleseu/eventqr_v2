{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Changer le mot de passe · EventQR{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h5 mb-3">Changer le mot de passe</h1>
        <form method="post" action="{% url 'account_change_password' %}">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-grid">
            <button class="btn btn-primary">Mettre à jour</button>
          </div>
        </form>
        <div class="mt-3">
          <a class="text-muted" href="{% url 'dashboard:index' %}">← Retour au dashboard</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
