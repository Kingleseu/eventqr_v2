<!doctype html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1"><title>Infos Retraite</title></head>
<body>
  <h1>Infos Retraite — {{ event.name }}</h1>
  <form method="post">{% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Enregistrer</button>
  </form>
  <p><a href="{% url 'events:detail' event.pk %}">Retour</a></p>
</body>
</html>
