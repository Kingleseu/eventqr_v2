<!doctype html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1"><title>Supprimer</title></head>
<body>
  <h1>Supprimer l'événement</h1>
  <p>Êtes-vous sûr de vouloir supprimer « {{ object.name }} » ?</p>
  <form method="post">{% csrf_token %}
    <button type="submit">Oui, supprimer</button>
  </form>
  <p><a href="{% url 'events:detail' object.pk %}">Annuler</a></p>
</body>
</html>
